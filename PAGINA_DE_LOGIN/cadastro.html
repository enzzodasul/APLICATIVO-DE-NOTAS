<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Conta - Notefy Studio</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top right,#5865f230,transparent 40%),
    radial-gradient(circle at bottom left,#7c3aed30,transparent 40%),
    #050816;
    font-family:Inter,sans-serif;
    color:white;
}

.register-layout{
    min-height:100vh;
    display:grid;
    grid-template-columns:1fr 1fr;
}

.register-left{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.register-card{
    width:100%;
    max-width:520px;
    background:#0f1729;
    border:1px solid rgba(255,255,255,.08);
    border-radius:32px;
    padding:40px;
}

.logo{
    font-size:42px;
    font-weight:900;
    margin-bottom:10px;
}

.logo span{
    color:#5865f2;
}

.subtitle{
    opacity:.7;
    line-height:1.7;
    margin-bottom:35px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.input-group input{
    width:100%;
    border:none;
    outline:none;
    background:#131c31;
    color:white;
    padding:16px;
    border-radius:16px;
}

.primary-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    font-weight:800;
    color:white;
    background:
    linear-gradient(
        135deg,
        #5865f2,
        #7c3aed
    );
    margin-top:8px;
}

.secondary-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    font-weight:700;
    color:white;
    background:#131c31;
    margin-top:12px;
}

.bottom-link{
    text-align:center;
    margin-top:24px;
}

.bottom-link a{
    color:white;
    text-decoration:none;
    opacity:.7;
}

.register-right{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.showcase{
    width:100%;
    max-width:600px;
    display:grid;
    gap:20px;
}

.show-card{
    height:180px;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    padding:24px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    box-shadow:
    0 20px 50px rgba(0,0,0,.35);
}

.card-1{
    background:
    linear-gradient(
        135deg,
        #7c3aed,
        #5865f2
    );
}

.card-2{
    background:
    linear-gradient(
        135deg,
        #06b6d4,
        #2563eb
    );
}

.card-3{
    background:
    linear-gradient(
        135deg,
        #ff7b00,
        #ff3c00
    );
}

.show-card span{
    opacity:.8;
}

.show-card h2{
    margin-top:10px;
    font-size:36px;
    line-height:1;
}

@media(max-width:1000px){

    .register-layout{
        grid-template-columns:1fr;
    }

    .register-right{
        display:none;
    }

}

</style>

</head>

<body>

<div class="register-layout">

    <div class="register-left">

        <div class="register-card">

            <div class="logo">
                Note<span>fy</span>
            </div>

            <p class="subtitle">
                Crie sua conta e tenha acesso ao editor
                completo de posts, stories e templates
                profissionais.
            </p>

            <div class="input-group">

                <label>Nome</label>

                <input
                type="text"
                id="nome"
                placeholder="Seu nome">

            </div>

            <div class="input-group">

                <label>Email</label>

                <input
                type="email"
                id="email"
                placeholder="Seu email">

            </div>

            <div class="input-group">

                <label>Senha</label>

                <input
                type="password"
                id="senha"
                placeholder="Crie uma senha">

            </div>

            <div class="input-group">

                <label>Confirmar Senha</label>

                <input
                type="password"
                id="confirmarSenha"
                placeholder="Repita sua senha">

            </div>

            <button
            class="primary-btn"
            onclick="criarConta()">

                <i class="fa-solid fa-user-plus"></i>
                Criar Conta

            </button>

            <button
            class="secondary-btn"
            onclick="window.location.href='login.index.html'">

                Já Tenho Conta

            </button>

            <div class="bottom-link">

                <a href="/index.html">
                    ← Voltar para Home
                </a>

            </div>

        </div>

    </div>

    <div class="register-right">

        <div class="showcase">

            <div class="show-card card-1">

                <span>INSTAGRAM</span>

                <h2>
                    VIRAL
                    POST
                </h2>

            </div>

            <div class="show-card card-2">

                <span>X / TWITTER</span>

                <h2>
                    SOCIAL
                    ENERGY
                </h2>

            </div>

            <div class="show-card card-3">

                <span>STORIES</span>

                <h2>
                    CREATOR
                    MODE
                </h2>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
