<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil - Notefy Studio</title>

<link rel="stylesheet" href="../style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{

    min-height:100vh;

    padding:40px;

}

.profile-container{

    max-width:1200px;

    margin:0 auto;

}

.profile-header{

    background:#0f1729;

    border:1px solid rgba(255,255,255,.06);

    border-radius:32px;

    padding:40px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:30px;

    flex-wrap:wrap;

}

.profile-left{

    display:flex;

    align-items:center;

    gap:25px;

}

.avatar{

    width:120px;

    height:120px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #5865f2,
        #7c3aed
    );

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:42px;

    font-weight:900;

}

.profile-info h1{

    font-size:38px;

    margin-bottom:8px;

}

.profile-info p{

    color:#9aa4b2;

}

.profile-actions{

    display:flex;

    gap:15px;

    flex-wrap:wrap;

}

.btn{

    border:none;

    border-radius:18px;

    padding:16px 24px;

    cursor:pointer;

    font-weight:800;

}

.btn-primary{

    background:
    linear-gradient(
        135deg,
        #5865f2,
        #7c3aed
    );

    color:white;

}

.btn-secondary{

    background:#131c31;

    color:white;

}

.stats{

    margin-top:30px;

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:20px;

}

.stat-card{

    background:#0f1729;

    border-radius:28px;

    padding:30px;

    border:1px solid rgba(255,255,255,.06);

}

.stat-card h2{

    font-size:38px;

    margin-bottom:8px;

}

.stat-card p{

    color:#9aa4b2;

}

.quick-actions{

    margin-top:30px;

    background:#0f1729;

    border-radius:28px;

    padding:30px;

    border:1px solid rgba(255,255,255,.06);

}

.quick-actions h2{

    margin-bottom:20px;

}

.action-grid{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:15px;

}

.action-card{

    background:#131c31;

    border-radius:20px;

    padding:25px;

    text-align:center;

    cursor:pointer;

    transition:.25s;

}

.action-card:hover{

    transform:
    translateY(-4px);

}

.action-card i{

    font-size:32px;

    margin-bottom:15px;

}

@media(max-width:900px){

    .stats{

        grid-template-columns:1fr;

    }

    .action-grid{

        grid-template-columns:1fr 1fr;

    }

}

@media(max-width:600px){

    .action-grid{

        grid-template-columns:1fr;

    }

}

</style>

</head>

<body>

<div class="profile-container">

    <div class="profile-header">

        <div class="profile-left">

            <div class="avatar">

                N

            </div>

            <div class="profile-info">

                <h1 id="profileName">

                    Usuário

                </h1>

                <p id="profileEmail">

                    email@email.com

                </p>

            </div>

        </div>

        <div class="profile-actions">

            <button
            class="btn btn-primary"
            onclick="window.location.href='../notas.index.html'">

                Abrir Editor

            </button>

            <button
            class="btn btn-secondary"
            onclick="logout()">

                Sair

            </button>

        </div>

    </div>

    <div class="stats">

        <div class="stat-card">

            <h2>25</h2>

            <p>Posts Criados</p>

        </div>

        <div class="stat-card">

            <h2>8</h2>

            <p>Templates Favoritos</p>

        </div>

        <div class="stat-card">

            <h2>12K</h2>

            <p>Downloads</p>

        </div>

    </div>

    <div class="quick-actions">

        <h2>

            Acesso Rápido

        </h2>

        <div class="action-grid">

            <div
            class="action-card"
            onclick="window.location.href='../notas.index.html'">

                <i class="fa-solid fa-pen-ruler"></i>

                <p>Editor</p>

            </div>

            <div class="action-card">

                <i class="fa-brands fa-instagram"></i>

                <p>Instagram</p>

            </div>

            <div class="action-card">

                <i class="fa-brands fa-x-twitter"></i>

                <p>X / Twitter</p>

            </div>

            <div class="action-card">

                <i class="fa-solid fa-images"></i>

                <p>Templates</p>

            </div>

        </div>

    </div>

</div>

<script src="../script.js"></script>

<script>

const nome =
localStorage.getItem(
    "notefy_nome"
);

const email =
localStorage.getItem(
    "notefy_email"
);

if(nome){

    document.getElementById(
        "profileName"
    ).innerHTML = nome;

    document.querySelector(
        ".avatar"
    ).innerHTML =
    nome.charAt(0)
    .toUpperCase();

}

if(email){

    document.getElementById(
        "profileEmail"
    ).innerHTML = email;

}

</script>

</body>
</html>
